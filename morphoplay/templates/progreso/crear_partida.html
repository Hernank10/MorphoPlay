{% extends 'base.html' %}
{% load static %}

{% block title %}Nueva Partida - MorphoPlay{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0">🎮 Crear Nueva Partida</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="juego_id" class="form-label">Juego</label>
                        <select name="juego_id" id="juego_id" class="form-select" required>
                            <option value="">Selecciona un juego...</option>
                            {% for juego in juegos %}
                            <option value="{{ juego.id }}">
                                {{ juego.titulo }} ({{ juego.categoria.nombre }} - {{ juego.nivel.nombre }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="correcto" name="correcto">
                            <label class="form-check-label" for="correcto">✅ ¿Respuesta Correcta?</label>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="puntuacion" class="form-label">Puntuación</label>
                        <input type="number" class="form-control" id="puntuacion" name="puntuacion" value="10" min="0">
                    </div>
                    
                    <div class="mb-3">
                        <label for="tiempo" class="form-label">Tiempo (segundos)</label>
                        <input type="number" class="form-control" id="tiempo" name="tiempo" value="10" min="0">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Guardar Partida
                        </button>
                        <a href="{% url 'progreso:partidas' %}" class="btn btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
